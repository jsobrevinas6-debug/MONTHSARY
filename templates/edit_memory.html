<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Edit Memory 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="form-card">
  <a href="/home" class="back-btn">← Back</a>
  <span class="roses">🌷</span>
  <h1>Edit <em>Memory</em></h1>
  <p class="subtitle">Update this beautiful moment</p>

  <form method="POST" action="/edit-memory/{{ memory[0] }}">
    <label>Memory Title</label>
    <input type="text" name="title" value="{{ memory[1] }}" required/>

    <label>Monthsary Number</label>
    <input type="number" name="monthsary_number" value="{{ memory[2] }}" min="1" required/>

    <label>Date</label>
    <input type="date" name="date" value="{{ memory[3] }}" required/>

    <label>Caption / Message</label>
    <textarea name="caption" rows="4">{{ memory[4] }}</textarea>

    <button type="submit">Save Changes 🌸</button>
  </form>
</div>
</body>
</html>
